<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; color: #fff; padding: 30px 3px; font-family: sans-serif; }
        textarea, input, select { width: 100%; padding: 10px; margin: 8px 0; background: #333; color: #fff; border: 1px solid #555; }
        button { padding: 15px; width: 100%; background: #fbbf24; color: #000; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h3>CÔNG CỤ TẠO TRỌN BỘ (THỨ - CA - LỚP)</h3>
    <select id="thu">
        <option value="thu-2">Thứ 2</option><option value="thu-3">Thứ 3</option>
        <option value="thu-4">Thứ 4</option><option value="thu-5">Thứ 5</option>
        <option value="thu-6">Thứ 6</option><option value="thu-7">Thứ 7</option>
    </select>
    <input type="text" id="caHoc" placeholder="Ca học (VD: 18:30 — PHIÊN HỌC)">
    <input type="text" id="idLop" placeholder="ID lớp (VD: APOLLO_L5_YEN)">
    <textarea id="danhSach" rows="8" placeholder="Danh sách học sinh (Tên SĐT)"></textarea>
    <button onclick="taoFullCode()">XUẤT MÃ ĐẦY ĐỦ</button>
    <textarea id="ketQua" rows="15" readonly></textarea>

    <script>
        function taoFullCode() {
            const thu = document.getElementById('thu').value;
            const caHoc = document.getElementById('caHoc').value;
            const idLop = document.getElementById('idLop').value.trim();
            const lines = document.getElementById('danhSach').value.split('\n');
            
            let students = '';
            lines.forEach((line, index) => {
                if(line.trim() === '') return;
                const i = index + 1;
                const stId = `st_${idLop}_${i}`;
                const phone = line.match(/\d+/g)?.join('') || '';
                
                students += `
            <div class="student-card" id="${stId}">
                <div>${i}. ${line}</div>
                <div class="btn-group">
                    <button class="btn-yes" onclick="setAttendance('${stId}', true)">Có</button>
                    <button class="btn-no" onclick="setAttendance('${stId}', false)">Vắng</button>
                    <a href="tel:${phone}" class="btn-call">📞 Gọi điện</a>
                </div>
                <select class="move-select" onchange="moveStudentDirect('${stId}', this.value)">
                    <option value="">➡️ Chuyển lớp...</option>
                </select>
                <select onchange="updateStudentClassContext('${stId}')">
                    <option value="">-- Ghi chú --</option>
                    <option value="Nghỉ phép">Nghỉ phép</option>
                    <option value="Đi muộn">Đi muộn</option>
                </select>
            </div>`;
            });

            const template = `
<div class="main-btn" onclick="toggle('${thu}')">► ${thu.toUpperCase().replace('-', ' ')}</div>
<div id="${thu}" class="section">
    <div class="time-btn" onclick="toggle('t_${idLop}')">${caHoc}</div>
    <div id="t_${idLop}" class="section">
        <div class="class-btn" onclick="toggle('list-${idLop}')">${idLop.replace(/_/g, ' ')} <span id="count-${idLop}" style="color:#fbbf24;">(0/0)</span> ▼</div>
        <div id="list-${idLop}" class="section" data-id="${idLop}" data-name="${idLop.replace(/_/g, ' ')}">
            ${students}
            <div class="bottom-controls">
                <div class="class-absent-list" id="absent-${idLop}">Danh sách vắng:<br>Không có</div>
                <button class="btn-copy" onclick="copyAbsentList('${idLop}')">📋 Copy DS Vắng</button>
            </div>
        </div>
    </div>
</div>`;
            document.getElementById('ketQua').value = template;
        }
    </script>
</body>
</html>
